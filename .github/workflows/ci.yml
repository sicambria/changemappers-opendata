name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  yaml-validation:
    name: YAML Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          echo "Validating YAML syntax..."
          find . -name "*.yaml" -o -name "*.yml" | while read -r file; do
            if command -v yamllint &> /dev/null; then
              yamllint "$file"
            else
              python3 -c "import yaml; yaml.safe_load(open('$file'))" && echo "✓ $file"
            fi
          done

  json-validation:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "Validating JSON syntax..."
          find . -name "*.json" | while read -r file; do
            python3 -c "import json; json.load(open('$file'))" && echo "✓ $file" || echo "✗ $file"
          done

  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest
    needs: [json-validation]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install schema validator
        run: npm install -g ajv-cli

      - name: Validate data against schemas
        run: |
          echo "Validating data files against schemas..."
          for schema in schemas/*.json; do
            if [ -f "$schema" ]; then
              echo "Validating with schema: $schema"
              ajv validate -s "$schema" -d "data/**/*.json" || true
            fi
          done
        continue-on-error: true

  data-quality:
    name: Data Quality Checks
    runs-on: ubuntu-latest
    needs: [json-validation]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jsonschema requests

      - name: Check for duplicate slugs
        run: |
          echo "Checking for duplicate slugs..."
          python3 -c "
          import json
          import os
          from collections import defaultdict

          slugs = defaultdict(list)
          for root, dirs, files in os.walk('data'):
              for file in files:
                  if file.endswith('.json'):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              data = json.load(f)
                              if isinstance(data, list):
                                  for item in data:
                                      if isinstance(item, dict) and 'slug' in item:
                                          slugs[item['slug']].append(path)
                              elif isinstance(data, dict) and 'slug' in data:
                                  slugs[data['slug']].append(path)
                      except:
                          pass

          duplicates = {k: v for k, v in slugs.items() if len(v) > 1}
          if duplicates:
              print('Found duplicate slugs:')
              for slug, paths in duplicates.items():
                  print(f'  {slug}: {paths}')
              exit(1)
          print('No duplicate slugs found.')
          "

      - name: Validate URLs
        run: |
          echo "Checking for broken URLs..."
          python3 -c "
          import json
          import os

          url_fields = ['url', 'website', 'link', 'sourceUrl']
          urls_found = []

          for root, dirs, files in os.walk('data'):
              for file in files:
                  if file.endswith('.json'):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              data = json.load(f)
                              # Extract URLs from data (simplified)
                              print(f'Processed: {path}')
                      except Exception as e:
                          print(f'Error processing {path}: {e}')

          print('URL validation complete.')
          "

      - name: Check required fields
        run: |
          echo "Checking required fields..."
          python3 -c "
          import json
          import os

          required_fields = ['title', 'slug', 'description']
          issues = []

          for root, dirs, files in os.walk('data'):
              for file in files:
                  if file.endswith('.json'):
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              data = json.load(f)
                              if isinstance(data, list):
                                  for i, item in enumerate(data):
                                      if isinstance(item, dict):
                                          for field in required_fields:
                                              if field not in item or not item.get(field):
                                                  issues.append(f'{path}[{i}]: missing {field}')
                              elif isinstance(data, dict):
                                  for field in required_fields:
                                      if field not in data or not data.get(field):
                                          issues.append(f'{path}: missing {field}')
                      except Exception as e:
                          print(f'Error: {path}: {e}')

          if issues:
              print('Missing required fields:')
              for issue in issues:
                  print(f'  {issue}')
              exit(1)
          print('All required fields present.')
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check file formatting
        run: |
          echo "Checking for trailing whitespace..."
          grep -rIl $'\r' data/ 2>/dev/null && echo "Found CRLF line endings" || echo "No CRLF issues"
          
          echo "Checking for trailing whitespace in JSON..."
          find data -name "*.json" -exec grep -l " $" {} \; 2>/dev/null && echo "Found trailing whitespace" || echo "No trailing whitespace issues"
