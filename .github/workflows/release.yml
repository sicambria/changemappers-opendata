name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate all JSON files
        run: |
          echo "Running full JSON validation..."
          find . -name "*.json" | while read -r file; do
            python3 -c "import json; json.load(open('$file'))" && echo "✓ $file"
          done

      - name: Validate all YAML files
        run: |
          echo "Running full YAML validation..."
          find . -name "*.yaml" -o -name "*.yml" | while read -r file; do
            python3 -c "import yaml; yaml.safe_load(open('$file'))" && echo "✓ $file"
          done

  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create data archive
        run: |
          echo "Creating data archive..."
          mkdir -p dist
          tar -czvf dist/changemappers-data.tar.gz -C . data/ schemas/ 2>/dev/null || tar -czvf dist/changemappers-data.tar.gz data/ 2>/dev/null || echo "Archive creation skipped"
          zip -r dist/changemappers-data.zip data/ schemas/ 2>/dev/null || zip -r dist/changemappers-data.zip data/ 2>/dev/null || echo "Archive creation skipped"

      - name: Generate release notes
        run: |
          echo "Generating release notes..."
          VERSION="${{ github.event.release.tag_name || inputs.version }}"
          DATE=$(date +%Y-%m-%d)
          cat > dist/release-notes.md << EOF
          # ChangeMappers OpenData Release ${VERSION}

          Release Date: ${DATE}

          ## Overview
          This release contains the latest open data for changemappers.org.

          ## Contents
          - Data files (JSON format)
          - Schema definitions
          - Documentation

          ## Usage
          Data can be accessed via:
          - GitHub repository: https://github.com/${{ github.repository }}
          - Website: https://changemappers.org

          ## License
          See LICENSE file for details.

          ## Changelog
          See COMMIT_HISTORY for detailed changes.
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify on Release
    runs-on: ubuntu-latest
    needs: [build, publish]
    if: github.event_name == 'release'
    steps:
      - name: Create summary
        run: |
          echo "## Release Complete! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ github.event.release.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Website: https://changemappers.org" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Repository: https://github.com/${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
