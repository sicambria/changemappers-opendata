id: derives_from
name: Derives From
description: An Entity is sourced, originated, or derived from another Entity. This captures lineage, origins, and evolutionary relationships.
version: 1.0.0
source: changemappers.org

allowed_from:
  - Initiative
  - Pattern
  - Methodology
  - Organization
  - Knowledge

allowed_to:
  - Initiative
  - Pattern
  - Methodology
  - Organization
  - Knowledge

properties:
  derivation_type:
    type: string
    description: How it derived (adaptation, inspiration, evolution, fork)
    required: false
  modifications:
    type: array
    description: What was modified from the source
    required: false
  derivation_date:
    type: date
    description: When the derivation occurred
    required: false
  attribution:
    type: string
    description: How the source is credited
    required: false

cardinality: many-to-one

inverse: derived_into

examples:
  - from: XRYouth
    to: ExtinctionRebellion
    properties:
      derivation_type: adaptation
      modifications: ["youth_focused", "school_strike_integration"]
      derivation_date: "2019-02-01"
      attribution: acknowledged_founding_movement
    confidence: 0.95
    source: https://changemappers.org/initiatives/xr-youth

  - from: ParticipatoryBudgetingYouth
    to: ParticipatoryBudgeting
    properties:
      derivation_type: adaptation
      modifications: ["youth_voting", "school_focus"]
