id: precedes
name: Precedes
description: An Entity comes before, antecedes, or is a precursor to another Entity in time or sequence. This captures temporal ordering relationships.
version: 1.0.0
source: changemappers.org

allowed_from:
  - Entity

allowed_to:
  - Entity

properties:
  temporal_gap:
    type: string
    description: Time between entities
    required: false
  causal_relationship:
    type: boolean
    description: Whether there is a causal connection
    required: false
  sequence_type:
    type: string
    description: Type of sequence (chronological, logical, developmental)
    required: false
  influence_level:
    type: number
    description: How much the first influenced the second (0.0-1.0)
    required: false

cardinality: one-to-one

inverse: follows

examples:
  - from: CivilRightsMovement
    to: BlackPowerMovement
    properties:
      temporal_gap: "5 years"
      causal_relationship: true
      sequence_type: developmental
      influence_level: 0.85
    confidence: 0.92
    source: https://changemappers.org/movements/civil-rights

  - from: AntiNuclearMovement
