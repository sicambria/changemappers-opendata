id: located_in
name: Located In
description: An Entity is physically positioned, situated, or based in a Location. This captures geographic and spatial context.
version: 1.0.0
source: changemappers.org

allowed_from:
  - Organization
  - Initiative
  - Project
  - Event
  - Resource
  - Actor

allowed_to:
  - Location
  - Region
  - Country
  - City
  - Neighborhood
  - Building

properties:
  location_type:
    type: string
    description: Type of location presence (headquarters, branch, virtual, distributed)
    required: false
  primary_location:
    type: boolean
    description: Whether this is the main location
    required: false
  coordinates:
    type: object
    description: Geographic coordinates (lat, long)
    required: false
  address:
    type: string
    description: Physical address
    required: false
  date_established:
    type: date
    description: When the entity was established at this location
    required: false

cardinality: many-to-one

inverse: contains

examples:
  - from: GreenpeaceInternational
    to: Amsterdam
    properties:
      location_type: headquarters
      primary_location: true
      coordinates:
        lat: 52.3702
        long: 4.8952
