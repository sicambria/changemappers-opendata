id: part_of
name: Part Of
description: An Entity belongs to, is contained within, or is a component of a larger Entity. This captures hierarchical and compositional relationships.
version: 1.0.0
source: changemappers.org

allowed_from:
  - Initiative
  - Organization
  - Project
  - Activity
  - Movement

allowed_to:
  - Initiative
  - Organization
  - Network
  - Movement
  - Coalition

properties:
  role:
    type: string
    description: The specific role within the larger entity
    required: false
  join_date:
    type: date
    description: When the entity became part of the larger entity
    required: false
  autonomy_level:
    type: string
    description: Degree of independence (autonomous, semi-autonomous, integrated)
    required: false
  contribution:
    type: string
    description: What the sub-entity contributes
    required: false

cardinality: many-to-one

inverse: has_part

examples:
  - from: FridaysForFutureGermany
    to: FridaysForFuture
    properties:
      role: national_chapter
      autonomy_level: semi-autonomous
      join_date: "2018-12-01"
    confidence: 0.98
    source: https://changemappers.org/initiatives/fff-germany

  - from: OxfamAmerica
    to: OxfamInternational
    properties:
      role: affiliate
      autonomy_level: semi-autonomous
      join_date: "1970-01-01"
    confidence: 0.97
    source: https://changemappers.org/organizations/oxfam-america

