id: initiates
name: Initiates
description: An Actor (person, organization, or group) starts, launches, or begins an Initiative, Project, or Campaign. This relationship captures the origin point and ownership of change-making activities.
version: 1.0.0
source: changemappers.org

allowed_from:
  - Actor
  - Organization
  - Person
  - Group

allowed_to:
  - Initiative
  - Project
  - Campaign
  - Movement

properties:
  role:
    type: string
    description: The specific role the actor plays in initiating (e.g., founder, co-initiator, sponsor)
    required: false
  start_date:
    type: date
    description: When the initiation occurred
    required: false
  motivation:
    type: string
    description: The stated motivation for initiating
    required: false
  context:
    type: string
    description: Circumstances or events that led to initiation
    required: false

cardinality: one-to-many

inverse: initiated_by

examples:
  - from: GreenpeaceInternational
    to: SaveTheArcticCampaign
    properties:
      role: primary_initiator
      start_date: "2012-06-21"
      motivation: Protecting Arctic ecosystem from oil drilling
    confidence: 0.95
    source: https://changemappers.org/initiatives/save-the-arctic

  - from: MuhammadYunus
