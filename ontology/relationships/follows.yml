id: follows
name: Follows
description: An Entity comes after, succeeds, or is subsequent to another Entity in time or sequence. This captures temporal ordering relationships.
version: 1.0.0
source: changemappers.org

allowed_from:
  - Entity

allowed_to:
  - Entity

properties:
  temporal_gap:
    type: string
    description: Time between entities
    required: false
  causal_relationship:
    type: boolean
    description: Whether there is a causal connection
    required: false
  sequence_type:
    type: string
    description: Type of sequence (chronological, logical, developmental)
    required: false
  learning_from:
    type: boolean
    description: Whether the later entity learned from the earlier
    required: false

cardinality: one-to-one

inverse: precedes

examples:
  - from: BlackPowerMovement
    to: CivilRightsMovement
    properties:
      temporal_gap: "5 years"
      causal_relationship: true
      sequence_type: developmental
      learning_from: true
    confidence: 0.92
    source: https://changemappers.org/movements/black-power

  - from: ClimateMovement
    to: AntiNuclearMovement
    properties:
      temporal_gap: "30 years"
      causal_relationship: false
      sequence_type: chronological
      learning_from: true
    confidence: 0.88
    source: https://changemappers.org/movements/climate

  - from: DemocraticSocialistsOfAmericaGrowth
