id: produces
name: Produces
description: An Entity creates, generates, or results in an Outcome, Impact, Product, or Deliverable. This captures the results and outputs of activities.
version: 1.0.0
source: changemappers.org

allowed_from:
  - Initiative
  - Project
  - Organization
  - Process
  - Activity

allowed_to:
  - Outcome
  - Impact
  - Product
  - Deliverable
  - Knowledge
  - Data

properties:
  outcome_type:
    type: string
    description: Type of output (intended, unintended, positive, negative)
    required: false
  measurement_unit:
    type: string
    description: How the outcome is measured
    required: false
  quantity:
    type: number
    description: Amount produced
    required: false
  timeframe:
    type: string
    description: Time period for production
    required: false
  verification_status:
    type: string
    description: Whether outcome has been verified (verified, claimed, disputed)
    required: false

cardinality: one-to-many

inverse: produced_by

examples:
  - from: GrameenBank
    to: PovertyReduction
    properties:
      outcome_type: intended
      measurement_unit: households_above_poverty_line
      quantity: 9500000
      verification_status: verified
    confidence: 0.94
    source: https://changemappers.org/initiatives/grameen-bank

  - from: Wikipedia
    to: KnowledgeRepository
    properties:
      outcome_type: intended
      measurement_unit: articles
      quantity: 62000000
      verification_status: verified
    confidence: 0.99
    source: https://changemappers.org/initiatives/wikipedia

  - from: GreenBeltMovement
    to: TreePlanting
    properties:
      outcome_type: intended
      measurement_unit: trees_planted
      quantity: 51000000
      verification_status: verified
    confidence: 0.96
    source: https://changemappers.org/initiatives/green-belt-movement

  - from: OpenStreetMap
    to: GeospatialData
    properties:
      outcome_type: intended
      measurement_unit: mapped_features
      quantity: 8500000000
      verification_status: verified
    confidence: 0.97
    source: https://changemappers.org/initiatives/osm

  - from: AirBnbAntiDiscrimination
    to: PolicyChange
    properties:
      outcome_type: intended
      verification_status: verified
      timeframe: "2016-present"
    confidence: 0.85
    source: https://changemappers.org/initiatives/airbnb-policy

  - from: ClimateStrike
    to: PublicAwareness
    properties:
      outcome_type: intended
      measurement_unit: participants
      quantity: 7600000
      verification_status: claimed
    confidence: 0.88
    source: https://changemappers.org/initiatives/climate-strike

  - from: TruthAndReconciliationCommission
    to: HistoricalRecord
    properties:
      outcome_type: intended
      verification_status: verified
      timeframe: "1996-2003"
    confidence: 0.93
    source: https://changemappers.org/initiatives/trc-south-africa

