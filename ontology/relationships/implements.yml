id: implements
name: Implements
description: An Initiative or Project applies, uses, or puts into practice a specific Pattern, Methodology, Framework, or Approach. This relationship captures the translation of abstract solutions into concrete action.
version: 1.0.0
source: changemappers.org

allowed_from:
  - Initiative
  - Project
  - Campaign
  - Program

allowed_to:
  - Pattern
  - Methodology
  - Framework
  - Approach
  - BestPractice

properties:
  adaptation_level:
    type: string
    description: How much the pattern was adapted (faithful, adapted, hybrid)
    required: false
  implementation_date:
    type: date
    description: When implementation began
    required: false
  fidelity:
    type: number
    description: Degree of fidelity to original pattern (0.0-1.0)
    required: false
  customizations:
    type: array
    description: Specific modifications made to the pattern
    required: false

cardinality: many-to-many

inverse: implemented_by

examples:
  - from: ParticipatoryBudgetingPortoAlegre
    to: ParticipatoryBudgetingPattern
    properties:
      adaptation_level: adapted
      implementation_date: "1989-01-01"
      fidelity: 0.85
    confidence: 0.95
    source: https://changemappers.org/initiatives/porto-alegre-pb

  - from: TransitionTownsTotnes
    to: TransitionTownFramework
    properties:
      adaptation_level: faithful
      implementation_date: "2006-01-01"
      fidelity: 0.92
    confidence: 0.93
    source: https://changemappers.org/initiatives/totnes-transition

  - from: GrameenBank
    to: MicrofinanceMethodology
    properties:
      adaptation_level: faithful
      implementation_date: "1983-10-01"
      fidelity: 0.95
    confidence: 0.98
    source: https://changemappers.org/initiatives/grameen-bank

  - from: CoolCitiesProgram
    to: UrbanHeatMitigationPattern
    properties:
      adaptation_level: hybrid
      implementation_date: "2018-06-01"
      fidelity: 0.70
