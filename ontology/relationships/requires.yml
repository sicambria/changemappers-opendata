id: requires
name: Requires
description: An Entity depends on, needs, or cannot function without another Entity. This captures dependencies, prerequisites, and resource requirements.
version: 1.0.0
source: changemappers.org

allowed_from:
  - Initiative
  - Project
  - Organization
  - Pattern
  - Methodology

allowed_to:
  - Resource
  - Skill
  - Knowledge
  - Technology
  - Funding
  - Permission
  - Partnership

properties:
  requirement_type:
    type: string
    description: Type of requirement (essential, recommended, optional)
    required: true
  availability_status:
    type: string
    description: Current availability (available, scarce, unavailable)
    required: false
  quantity_needed:
    type: string
    description: Amount or quantity required
    required: false
  timeframe:
    type: string
    description: When the requirement is needed
    required: false
  consequence_if_missing:
    type: string
    description: What happens if requirement is not met
    required: false

cardinality: many-to-many

inverse: required_by

examples:
  - from: CommunityGardenProject
    to: LandAccess
    properties:
      requirement_type: essential
      availability_status: available
      consequence_if_missing: project_cannot_proceed
    confidence: 0.95
    source: https://changemappers.org/initiatives/community-garden

  - from: SolarPanelInstallation
    to: TechnicalExpertise
    properties:
      requirement_type: essential
      availability_status: available
      quantity_needed: "2 certified installers"
    confidence: 0.92
    source: https://changemappers.org/initiatives/solar-install

  - from: RefugeeResettlementProgram
    to: HousingResources
    properties:
      requirement_type: essential
      availability_status: scarce
      quantity_needed: "50 units"
      timeframe: immediate
    confidence: 0.88
    source: https://changemappers.org/initiatives/refugee-resettlement

  - from: OpenDataInitiative
    to: DataStandardization
    properties:
      requirement_type: recommended
      availability_status: available
    confidence: 0.90
    source: https://changemappers.org/initiatives/open-data

  - from: MicrofinanceProgram
    to: FinancialLiteracyTraining
    properties:
      requirement_type: essential
      availability_status: available
      timeframe: before_disbursement
    confidence: 0.94
    source: https://changemappers.org/initiatives/microfinance

  - from: PublicHealthCampaign
    to: CommunityTrust
    properties:
      requirement_type: essential
      availability_status: variable
      consequence_if_missing: low_participation
    confidence: 0.89
    source: https://changemappers.org/initiatives/health-campaign

  - from: ReforestationProject
    to: IndigenousLandRights
    properties:
      requirement_type: essential
      availability_status: pending
      consequence_if_missing: legal_challenges
    confidence: 0.91
    source: https://changemappers.org/initiatives/reforestation

