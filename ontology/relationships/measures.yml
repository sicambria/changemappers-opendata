id: measures
name: Measures
description: An Indicator, Metric, or Assessment tool measures an Impact, Outcome, or Progress. This captures evaluation and monitoring relationships.
version: 1.0.0
source: changemappers.org

allowed_from:
  - Indicator
  - Metric
  - Assessment
  - Index

allowed_to:
  - Impact
  - Outcome
  - Progress
  - Change
  - Goal

properties:
  measurement_frequency:
    type: string
    description: How often measurement occurs (continuous, daily, monthly, annually)
    required: false
  unit:
    type: string
    description: Unit of measurement
    required: false
  baseline:
    type: number
    description: Starting value for comparison
    required: false
  target:
    type: number
    description: Goal value
    required: false
  data_source:
    type: string
    description: Where the measurement data comes from
    required: false
  reliability:
    type: number
    description: Reliability of the measurement (0.0-1.0)
    required: false

cardinality: many-to-one

inverse: measured_by

examples:
  - from: GiniCoefficient
    to: IncomeInequality
    properties:
      measurement_frequency: annually
      unit: coefficient_0_to_1
      baseline: 0.35
      target: 0.30
      reliability: 0.95
    confidence: 0.98
    source: https://changemappers.org/indicators/gini

  - from: CarbonFootprint
    to: ClimateImpact
    properties:
      measurement_frequency: annually
      unit: tonnes_CO2_equivalent
      baseline: 50000
      target: 10000
      reliability: 0.90
    confidence: 0.95
    source: https://changemappers.org/indicators/carbon-footprint

  - from: HumanDevelopmentIndex
    to: QualityOfLife
    properties:
      measurement_frequency: annually
      unit: index_0_to_1
      reliability: 0.88
    confidence: 0.94
    source: https://changemappers.org/indicators/hdi

  - from: ParticipationRate
    to: CivicEngagement
    properties:
      measurement_frequency: monthly
      unit: percentage
      baseline: 15
      target: 40
      data_source: event_attendance
    confidence: 0.92
    source: https://changemappers.org/indicators/participation

  - from: HousingAffordabilityIndex
    to: HousingSecurity
    properties:
      measurement_frequency: quarterly
      unit: ratio_median_income_to_median_price
      baseline: 5.0
      target: 3.0
    confidence: 0.91
    source: https://changemappers.org/indicators/housing-affordability

  - from: TreeCoverChange
    to: EnvironmentalHealth
    properties:
      measurement_frequency: annually
      unit: hectares
      baseline: 10000
      target: 15000
      data_source: satellite_imagery
    confidence: 0.93
    source: https://changemappers.org/indicators/tree-cover

  - from: SocialTrustIndex
    to: SocialCohesion
    properties:
      measurement_frequency: annually
      unit: survey_score_1_to_10
      baseline: 5.5
      target: 7.0
      reliability: 0.82
    confidence: 0.87
    source: https://changemappers.org/indicators/social-trust

metadata:
  created_at: "2024-01-15T10:00:00Z"
  updated_at: "2024-01-15T10:00:00Z"
  author: changemappers.org
