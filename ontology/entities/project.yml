id: project
name: Project
description: A specific, time-bound implementation effort with defined objectives, deliverables, and resources within a change initiative.
category: activity
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the project
    - name: name
      type: string
      required: true
      description: Name of the project
    - name: description
      type: string
      required: true
      description: Description of project goals and activities
    - name: type
      type: enum
      required: true
      description: Classification of the project
      enum_values:
        - research
        - advocacy
        - capacity_building
        - direct_action
        - pilot
        - demonstration
        - infrastructure
    - name: status
      type: enum
      required: true
      description: Current status of the project
      enum_values:
        - planning
        - active
        - on_hold
        - completed
        - cancelled
    - name: start_date
      type: date
      required: true
      description: Project start date
    - name: end_date
      type: date
      required: false
      description: Project end date or expected completion
    - name: initiative_id
      type: string
      required: false
      description: Parent initiative
    - name: lead_actor_id
      type: string
      required: false
      description: Primary actor responsible
    - name: lead_organization_id
      type: string
      required: false
      description: Primary organization responsible
    - name: actor_ids
      type: array[string]
      required: false
      description: Actors involved in project
    - name: location_ids
      type: array[string]
      required: false
      description: Project locations
    - name: budget
      type: number
      required: false
      description: Project budget amount
    - name: budget_currency
      type: string
      required: false
      description: Currency code (ISO 4217)
    - name: deliverables
      type: array[string]
      required: false
      description: Expected deliverables
    - name: outcome_ids
      type: array[string]
      required: false
      description: Expected outcomes
    - name: metric_ids
      type: array[string]
      required: false
      description: Metrics tracked
    - name: phase_id
      type: string
      required: false
      description: Current phase
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
  - field: name
    rule: max_length
    value: 200
    message: Name must not exceed 200 characters
  - field: budget
    rule: min_value
    value: 0
    message: Budget must be non-negative
  - field: end_date
    rule: greater_than
    value: start_date
    message: End date must be after start date
relationships:
  - entity: initiative
    type: part_of
    description: Project is part of an initiative
  - entity: actor
    type: led_by
    description: Project is led by actors
  - entity: organization
    type: implemented_by
    description: Project is implemented by organizations
  - entity: location
    type: located_in
    description: Project operates in locations
  - entity: outcome
    type: produces
    description: Project produces outcomes
  - entity: metric
    type: measured_by
    description: Project is measured by metrics
  - entity: phase
    type: in_phase
    description: Project is in a phase
