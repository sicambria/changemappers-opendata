id: resource
name: Resource
description: An asset, material, or support available for use in change initiatives and projects.
category: asset
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the resource
    - name: name
      type: string
      required: true
      description: Name of the resource
    - name: description
      type: string
      required: true
      description: Description of the resource
    - name: type
      type: enum
      required: true
      description: Classification of the resource
      enum_values:
        - financial
        - physical
        - human
        - informational
        - network
        - technical
        - political
    - name: category
      type: enum
      required: false
      description: Resource category
      enum_values:
        - funding
        - space
        - equipment
        - expertise
        - data
        - relationships
        - tools
    - name: owner_id
      type: string
      required: false
      description: Actor or organization that owns the resource
    - name: availability
      type: enum
      required: false
      description: Availability status
      enum_values:
        - available
        - limited
        - restricted
        - unavailable
    - name: access_requirements
      type: array[string]
      required: false
      description: Requirements to access this resource
    - name: quantity
      type: number
      required: false
      description: Quantity available
    - name: unit
      type: string
      required: false
      description: Unit of measurement
    - name: location_id
      type: string
      required: false
      description: Physical location
    - name: domain_ids
      type: array[string]
      required: false
      description: Domains where resource applies
    - name: project_ids
      type: array[string]
      required: false
      description: Projects using this resource
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
relationships:
  - entity: actor
    type: owned_by
    description: Resource is owned by actors
  - entity: organization
    type: managed_by
    description: Resource is managed by organizations
  - entity: project
    type: used_in
    description: Resource is used in projects
  - entity: location
    type: located_at
    description: Resource is located at locations
  - entity: domain
    type: applies_to
    description: Resource applies to domains
