taxonomies:
  - citation_types
  - citation_domains
  - citation_reliability
metadata:
  branding: ChangeMappers - Mapping pathways to positive change
  namespace: https://changemappers.org/ontology/entities/citation
  provenance: ChangeMappers Ontology Project
