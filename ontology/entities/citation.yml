id: citation
name: Citation
description: A reference or source that supports claims, data, or information in the ChangeMappers knowledge base.
category: reference
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the citation
    - name: type
      type: enum
      required: true
      description: Type of citation
      enum_values:
        - academic
        - report
        - news
        - government
        - website
        - book
        - interview
        - documentary
        - data
    - name: title
      type: string
      required: true
      description: Title of the cited work
    - name: authors
      type: array[string]
      required: false
      description: Authors or creators
    - name: publication
      type: string
      required: false
      description: Publication or publisher
    - name: date
      type: date
      required: false
      description: Publication date
    - name: url
      type: string
      required: false
      description: URL if available online
    - name: doi
      type: string
      required: false
      description: Digital Object Identifier
    - name: isbn
      type: string
      required: false
      description: ISBN for books
    - name: pages
      type: string
      required: false
      description: Page numbers
    - name: volume
      type: string
      required: false
      description: Volume and issue
    - name: description
      type: string
      required: false
      description: Brief description of the source
    - name: relevance
      type: string
      required: false
      description: Relevance to ChangeMappers
    - name: story_ids
      type: array[string]
      required: false
      description: Stories citing this source
    - name: dataset_ids
      type: array[string]
      required: false
      description: Datasets citing this source
    - name: domain_ids
      type: array[string]
      required: false
      description: Domains covered
    - name: access_date
      type: date
      required: false
      description: Date accessed (for websites)
    - name: archive_url
      type: string
      required: false
      description: Archive URL
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: title
    rule: min_length
    value: 5
    message: Title must be at least 5 characters
  - field: url
    rule: format
    value: url
    message: Must be a valid URL
relationships:
  - entity: story
    type: supports
    description: Citation supports stories
  - entity: dataset
    type: sources
    description: Citation sources datasets
  - entity: domain
    type: covers
    description: Citation covers domains
examples:
  - id: cite_001
    type: report
    title: "Community Solar Initiative Impact Assessment"
    authors:
      - Community Power Initiative
    publication: Community Power Initiative
    date: '2024-03-01'
    url: https://example.com/community-solar-impact
    description: Impact assessment of Portland community solar project
    relevance: Documents outcomes and lessons from community solar model
    domain_ids:
      - dom_energy
    created_at: '2024-03-15T10:00:00Z'
    updated_at: '2024-06-20T14:00:00Z'
    source: changemappers.org
  - id: cite_002
    type: academic
    title: "Just Transition: A Framework for Equity in Environmental Policy"
    authors:
      - Dr. Sarah Martinez
