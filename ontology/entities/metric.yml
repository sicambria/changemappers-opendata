id: metric
name: Metric
description: A quantified measure that tracks specific aspects of change initiatives, projects, or outcomes.
category: measurement
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the metric
    - name: name
      type: string
      required: true
      description: Name of the metric
    - name: description
      type: string
      required: true
      description: Description of what the metric measures
    - name: type
      type: enum
      required: true
      description: Classification of the metric
      enum_values:
        - performance
        - process
        - output
        - efficiency
        - quality
        - coverage
    - name: value
      type: number
      required: false
      description: Current measured value
    - name: unit
      type: string
      required: true
      description: Unit of measurement
    - name: target
      type: number
      required: false
      description: Target value
    - name: baseline
      type: number
      required: false
      description: Baseline value
    - name: trend
      type: enum
      required: false
      description: Direction of change
      enum_values:
        - improving
        - stable
        - declining
    - name: data_source
      type: string
      required: false
      description: Source of metric data
    - name: collection_method
      type: string
      required: false
      description: How data is collected
    - name: frequency
      type: enum
      required: false
      description: Collection frequency
      enum_values:
        - realtime
        - daily
        - weekly
        - monthly
        - quarterly
        - annually
    - name: project_id
      type: string
      required: false
      description: Related project
    - name: indicator_id
      type: string
      required: false
      description: Related indicator
    - name: domain_ids
      type: array[string]
      required: false
      description: Domains where metric applies
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
relationships:
  - entity: project
    type: measures
    description: Metric measures project
  - entity: indicator
    type: supports
    description: Metric supports indicator
  - entity: domain
    type: applies_to
    description: Metric applies to domains
examples:
