id: sector
name: Sector
description: An industry, field, or area of economic and social activity where change work occurs.
category: classification
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the sector
    - name: name
      type: string
      required: true
      description: Name of the sector
    - name: description
      type: string
      required: true
      description: Description of the sector
    - name: type
      type: enum
      required: true
      description: Classification of the sector
      enum_values:
        - economic
        - public
        - nonprofit
        - movement
        - cultural
        - environmental
    - name: parent_sector_id
      type: string
      required: false
      description: Parent sector in hierarchy
    - name: organization_ids
      type: array[string]
      required: false
      description: Organizations in this sector
    - name: actor_ids
      type: array[string]
      required: false
      description: Actors working in this sector
    - name: initiative_ids
      type: array[string]
      required: false
      description: Initiatives in this sector
    - name: related_sector_ids
      type: array[string]
      required: false
      description: Related sectors
    - name: key_issues
      type: array[string]
      required: false
      description: Key issues in this sector
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
relationships:
  - entity: organization
    type: contains
    description: Sector contains organizations
  - entity: actor
    type: employs
    description: Sector employs actors
  - entity: initiative
    type: addresses
    description: Sector addresses initiatives
examples:
  - id: sec_energy
    name: Energy
    description: Sector covering energy production, distribution, and consumption.
    type: economic
    organization_ids:
      - org_001
    initiative_ids:
      - init_001
    key_issues:
      - Fossil fuel dependency
      - Energy access
      - Just transition
      - Energy democracy
    created_at: '2024-01-10T08:00:00Z'
    updated_at: '2024-06-20T14:00:00Z'
    source: changemappers.org
  - id: sec_food_systems
    name: Food and Agriculture
