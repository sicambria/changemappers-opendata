id: domain
name: Domain
description: A broad area of change work or focus that encompasses multiple related topics and subdomains.
category: classification
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the domain
    - name: name
      type: string
      required: true
      description: Name of the domain
    - name: description
      type: string
      required: true
      description: Description of the domain
    - name: type
      type: enum
      required: true
      description: Classification of the domain
      enum_values:
        - thematic
        - sectoral
        - process
        - system
        - outcome
    - name: parent_domain_id
      type: string
      required: false
      description: Parent domain in hierarchy
    - name: subdomain_ids
      type: array[string]
      required: false
      description: Subdomains within this domain
    - name: topic_ids
      type: array[string]
      required: false
      description: Topics within this domain
    - name: initiative_ids
      type: array[string]
      required: false
      description: Initiatives in this domain
    - name: actor_ids
      type: array[string]
      required: false
      description: Actors working in this domain
    - name: organization_ids
      type: array[string]
      required: false
      description: Organizations working in this domain
    - name: related_domain_ids
      type: array[string]
      required: false
      description: Related domains
    - name: key_concepts
      type: array[string]
      required: false
      description: Key concepts in this domain
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
relationships:
  - entity: subdomain
    type: contains
    description: Domain contains subdomains
  - entity: topic
    type: includes
    description: Domain includes topics
  - entity: initiative
    type: addressed_by
    description: Domain is addressed by initiatives
  - entity: actor
    type: practiced_by
    description: Domain is practiced by actors
examples:
  - id: dom_energy
    name: Energy
    description: Domain covering energy systems, transitions, and justice.
    type: system
    subdomain_ids:
      - sdom_renewable_energy
      - sdom_energy_democracy
      - sdom_energy_access
    key_concepts:
      - Energy democracy
      - Just transition
      - Distributed generation
      - Community ownership
    created_at: '2024-01-10T08:00:00Z'
    updated_at: '2024-06-20T14:00:00Z'
    source: changemappers.org
  - id: dom_food_systems
    name: Food Systems
    description: Domain covering food production, distribution, access, and sovereignty.
    type: system
    subdomain_ids:
      - sdom_urban_agriculture
      - sdom_food_sovereignty
      - sdom_food_justice
    initiative_ids:
      - init_003
    key_concepts:
      - Food sovereignty
      - Food apartheid
      - Community food systems
      - Urban agriculture
    created_at: '2024-02-01T09:00:00Z'
    updated_at: '2024-07-01T11:00:00Z'
    source: changemappers.org
  - id: dom_climate_justice
    name: Climate Justice
    description: Domain covering climate action with equity and justice at the center.
    type: thematic
    subdomain_ids:
      - sdom_climate_adaptation
      - sdom_climate_mitigation
      - sdom_climate_governance
    initiative_ids:
      - init_002
      - init_004
    key_concepts:
      - Climate justice
      - Frontline communities
      - Just transition
      - Climate resilience
    created_at: '2024-01-20T10:00:00Z'
    updated_at: '2024-06-15T15:00:00Z'
    source: changemappers.org
  - id: dom_economic_justice
    name: Economic Justice
    description: Domain covering economic systems that prioritize equity and community well-being.
    type: system
    subdomain_ids:
      - sdom_solidarity_economy
      - sdom_cooperatives
      - sdom_community_wealth
    initiative_ids:
      - init_007
    key_concepts:
      - Solidarity economy
      - Community wealth building
      - Worker ownership
      - Economic democracy
    created_at: '2024-03-10T11:00:00Z'
    updated_at: '2024-05-25T09:30:00Z'
    source: changemappers.org
  - id: dom_ecosystem_restoration
    name: Ecosystem Restoration
    description: Domain covering restoration of degraded ecosystems and stewardship practices.
    type: system
    subdomain_ids:
      - sdom_watershed_restoration
      - sdom_indigenous_stewardship
    initiative_ids:
      - init_005
    key_concepts:
      - Ecological restoration
      - Traditional ecological knowledge
      - Indigenous stewardship
      - Watershed health
    created_at: '2024-02-15T12:00:00Z'
    updated_at: '2024-07-05T14:00:00Z'
    source: changemappers.org
  - id: dom_land_justice
    name: Land Justice
    description: Domain covering land rights, access, and stewardship.
    type: thematic
    subdomain_ids:
      - sdom_land_back
      - sdom_land_trusts
      - sdom_land_access
    initiative_ids:
      - init_006
    key_concepts:
      - Land back
      - Indigenous land rights
      - Community land trusts
      - Land sovereignty
    created_at: '2024-04-01T09:00:00Z'
    updated_at: '2024-06-20T10:00:00Z'
    source: changemappers.org
  - id: dom_democracy
    name: Democracy
    description: Domain covering democratic governance, participation, and power.
    type: process
    key_concepts:
      - Participatory democracy
      - Community governance
      - Power building
      - Civic engagement
    created_at: '2024-03-01T10:00:00Z'
    updated_at: '2024-05-30T14:00:00Z'
    source: changemappers.org
taxonomies:
  - domain_types
  - domain_hierarchy
  - domain_classifications
metadata:
  branding: ChangeMappers - Mapping pathways to positive change
  namespace: https://changemappers.org/ontology/entities/domain
  provenance: ChangeMappers Ontology Project
