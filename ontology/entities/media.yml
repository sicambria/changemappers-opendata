id: media
name: Media
description: A content asset including images, videos, audio, documents, and other media that documents or communicates change work.
category: content
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the media
    - name: name
      type: string
      required: true
      description: Name or title of the media
    - name: description
      type: string
      required: false
      description: Description of the media content
    - name: type
      type: enum
      required: true
      description: Classification of media type
      enum_values:
        - image
        - video
        - audio
        - document
        - presentation
        - infographic
        - map
        - interactive
    - name: format
      type: string
      required: false
      description: File format (jpg, mp4, pdf, etc.)
    - name: url
      type: string
      required: false
      description: URL to access the media
    - name: thumbnail_url
      type: string
      required: false
      description: URL to thumbnail image
    - name: creator_id
      type: string
      required: false
      description: Creator or photographer
    - name: date_created
      type: date
      required: false
      description: Date media was created
    - name: event_id
      type: string
      required: false
      description: Event documented
    - name: project_id
      type: string
      required: false
      description: Related project
    - name: initiative_id
      type: string
      required: false
      description: Related initiative
    - name: story_ids
      type: array[string]
      required: false
      description: Stories using this media
    - name: location_id
      type: string
      required: false
      description: Location depicted
    - name: people_featured
      type: array[string]
      required: false
      description: People featured in media
    - name: rights
      type: string
      required: false
      description: Usage rights and credits
    - name: license
      type: string
      required: false
      description: License type
    - name: caption
      type: string
      required: false
      description: Caption or alt text
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
  - field: url
    rule: format
    value: url
    message: Must be a valid URL
relationships:
  - entity: event
    type: documents
    description: Media documents events
  - entity: project
    type: documents
    description: Media documents projects
  - entity: story
    type: illustrates
    description: Media illustrates stories
  - entity: location
    type: depicts
    description: Media depicts locations
  - entity: narrative
    type: expresses
    description: Media expresses narratives
