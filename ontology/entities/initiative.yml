id: initiative
name: Initiative
description: An organized, sustained effort directed toward achieving change goals, typically involving multiple actors, projects, and resources.
category: activity
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the initiative
    - name: name
      type: string
      required: true
      description: Name of the initiative
    - name: description
      type: string
      required: true
      description: Description of the initiative's purpose and goals
    - name: type
      type: enum
      required: true
      description: Classification of the initiative
      enum_values:
        - campaign
        - movement
        - program
        - coalition
        - collaborative
    - name: status
      type: enum
      required: true
      description: Current status of the initiative
      enum_values:
        - planning
        - active
        - paused
        - completed
        - archived
    - name: start_date
      type: date
      required: false
      description: When the initiative began
    - name: end_date
      type: date
      required: false
      description: When the initiative ended or is planned to end
    - name: lead_actor_id
      type: string
      required: false
      description: Primary actor leading the initiative
    - name: lead_organization_id
      type: string
      required: false
      description: Primary organization leading the initiative
    - name: actor_ids
      type: array[string]
      required: false
      description: Actors involved in the initiative
    - name: project_ids
      type: array[string]
      required: false
      description: Projects under this initiative
    - name: cause_ids
      type: array[string]
      required: false
      description: Causes being addressed
    - name: domain_ids
      type: array[string]
      required: false
      description: Domains of focus
    - name: location_ids
      type: array[string]
      required: false
      description: Geographic scope
    - name: scale_id
      type: string
      required: false
      description: Scale of impact
    - name: outcome_ids
      type: array[string]
      required: false
      description: Expected or achieved outcomes
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
  - field: name
    rule: max_length
    value: 200
    message: Name must not exceed 200 characters
  - field: description
    rule: max_length
    value: 10000
    message: Description must not exceed 10000 characters
  - field: end_date
    rule: greater_than
    value: start_date
    message: End date must be after start date
relationships:
  - entity: actor
    type: led_by
    description: Initiative is led by actors
  - entity: organization
    type: hosted_by
    description: Initiative may be hosted by organization
  - entity: project
    type: includes
    description: Initiative includes projects
  - entity: cause
    type: addresses
    description: Initiative addresses causes
  - entity: domain
    type: focuses_on
    description: Initiative focuses on domains
  - entity: location
    type: operates_in
    description: Initiative operates in locations
  - entity: outcome
    type: produces
    description: Initiative produces outcomes
  - entity: impact
    type: generates
    description: Initiative generates impact
