id: location
name: Location
description: A geographic place where change initiatives, actors, or events are situated.
category: geography
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the location
    - name: name
      type: string
      required: true
      description: Name of the location
    - name: description
      type: string
      required: false
      description: Description of the location
    - name: type
      type: enum
      required: true
      description: Classification of the location
      enum_values:
        - city
        - region
        - watershed
        - bioregion
        - nation
        - neighborhood
        - site
        - territory
        - indigenous_land
    - name: parent_location_id
      type: string
      required: false
      description: Parent location in hierarchy
    - name: indigenous_territory
      type: boolean
      required: false
      description: Whether this is Indigenous territory
    - name: indigenous_nations
      type: array[string]
      required: false
      description: Indigenous nations associated with this location
    - name: coordinates
      type: object
      required: false
      description: Geographic coordinates
    - name: boundaries
      type: object
      required: false
      description: Geographic boundaries
    - name: population
      type: integer
      required: false
      description: Population
    - name: area
      type: number
      required: false
      description: Area in square kilometers
    - name: climate_zone
      type: string
      required: false
      description: Climate zone classification
    - name: domain_ids
      type: array[string]
      required: false
      description: Relevant domains for this location
    - name: initiative_ids
      type: array[string]
      required: false
      description: Initiatives in this location
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
relationships:
  - entity: actor
    type: home_of
    description: Location is home of actors
  - entity: organization
    type: base_of
    description: Location is base of organizations
  - entity: initiative
    type: site_of
    description: Location is site of initiatives
  - entity: project
    type: location_of
    description: Location is site of projects
  - entity: event
    type: venue_of
    description: Location is venue of events
