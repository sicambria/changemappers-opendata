id: tool
name: Tool
description: An instrument, platform, resource, or method used to accomplish specific tasks in change processes.
category: resource
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the tool
    - name: name
      type: string
      required: true
      description: Name of the tool
    - name: description
      type: string
      required: true
      description: Description of the tool
    - name: type
      type: enum
      required: true
      description: Classification of the tool
      enum_values:
        - software
        - platform
        - methodology
        - framework
        - template
        - hardware
        - resource
    - name: category
      type: enum
      required: false
      description: Functional category
      enum_values:
        - communication
        - data_management
        - organizing
        - analysis
        - visualization
        - collaboration
        - documentation
    - name: url
      type: string
      required: false
      description: URL to access or learn about the tool
    - name: cost
      type: enum
      required: false
      description: Cost structure
      enum_values:
        - free
        - freemium
        - paid
        - open_source
    - name: skill_ids
      type: array[string]
      required: false
      description: Skills required or related
    - name: domain_ids
      type: array[string]
      required: false
      description: Domains where tool is useful
    - name: use_cases
      type: array[string]
      required: false
      description: Common use cases
    - name: limitations
      type: array[string]
      required: false
      description: Known limitations
    - name: alternatives
      type: array[string]
      required: false
      description: Alternative tools
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
  - field: url
    rule: format
    value: url
    message: Must be a valid URL
relationships:
  - entity: skill
    type: requires
    description: Tool requires skills
  - entity: domain
    type: applies_to
    description: Tool applies to domains
  - entity: actor
    type: used_by
    description: Tool is used by actors
  - entity: project
    type: used_in
    description: Tool is used in projects
examples:
