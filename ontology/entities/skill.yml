id: skill
name: Skill
description: A capability, competency, or area of expertise that actors possess and apply in change processes.
category: capability
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the skill
    - name: name
      type: string
      required: true
      description: Name of the skill
    - name: description
      type: string
      required: true
      description: Description of the skill
    - name: type
      type: enum
      required: true
      description: Classification of the skill
      enum_values:
        - technical
        - organizing
        - leadership
        - communication
        - analytical
        - creative
        - facilitation
        - strategic
    - name: domain_ids
      type: array[string]
      required: false
      description: Domains where this skill applies
    - name: level_options
      type: array[string]
      required: false
      description: Possible proficiency levels
    - name: related_skill_ids
      type: array[string]
      required: false
      description: Related skills
    - name: learned_from
      type: array[string]
      required: false
      description: How this skill is typically acquired
    - name: applications
      type: array[string]
      required: false
      description: Applications of this skill
    - name: program_ids
      type: array[string]
      required: false
      description: Programs that teach this skill
    - name: tool_ids
      type: array[string]
      required: false
      description: Tools used with this skill
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
  - field: name
    rule: max_length
    value: 100
    message: Name must not exceed 100 characters
relationships:
  - entity: actor
    type: possessed_by
    description: Skill is possessed by actors
  - entity: program
    type: taught_in
    description: Skill is taught in programs
  - entity: tool
    type: uses
    description: Skill uses tools
  - entity: domain
    type: applies_to
    description: Skill applies to domains
