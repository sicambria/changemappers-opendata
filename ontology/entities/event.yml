id: event
name: Event
description: An occurrence in time, including gatherings, trainings, actions, and milestones in change processes.
category: activity
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the event
    - name: name
      type: string
      required: true
      description: Name of the event
    - name: description
      type: string
      required: false
      description: Description of the event
    - name: type
      type: enum
      required: true
      description: Classification of the event
      enum_values:
        - gathering
        - training
        - action
        - milestone
        - ceremony
        - conference
        - workshop
        - protest
    - name: start_date
      type: datetime
      required: true
      description: Event start date and time
    - name: end_date
      type: datetime
      required: false
      description: Event end date and time
    - name: location_id
      type: string
      required: false
      description: Event location
    - name: virtual
      type: boolean
      required: false
      description: Whether event is virtual
    - name: organizer_id
      type: string
      required: false
      description: Actor or organization organizing
    - name: participant_ids
      type: array[string]
      required: false
      description: Expected or actual participants
    - name: initiative_id
      type: string
      required: false
      description: Related initiative
    - name: project_id
      type: string
      required: false
      description: Related project
    - name: expected_attendance
      type: integer
      required: false
      description: Expected number of attendees
    - name: actual_attendance
      type: integer
      required: false
      description: Actual attendance count
    - name: outcomes
      type: array[string]
      required: false
      description: Event outcomes
    - name: media_ids
      type: array[string]
      required: false
      description: Associated media
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
  - field: end_date
    rule: greater_than
    value: start_date
    message: End date must be after start date
relationships:
  - entity: location
    type: held_at
    description: Event is held at location
  - entity: actor
    type: organized_by
    description: Event is organized by actors
  - entity: initiative
    type: part_of
    description: Event is part of initiative
  - entity: timeline
    type: included_in
    description: Event is included in timeline
  - entity: media
    type: documented_by
    description: Event is documented by media
