id: organization
name: Organization
description: A formal organized entity with defined structure, mission, and capacity to act within change processes.
category: agent
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the organization
    - name: name
      type: string
      required: true
      description: Official name of the organization
    - name: type
      type: enum
      required: true
      description: Legal or structural type of organization
      enum_values:
        - nonprofit
        - for_profit
        - cooperative
        - foundation
        - government
        - educational
        - network
        - community_org
    - name: description
      type: string
      required: false
      description: Mission and purpose description
    - name: founding_date
      type: date
      required: false
      description: Date organization was founded
    - name: location_id
      type: string
      required: false
      description: Primary location/headquarters
    - name: sector_ids
      type: array[string]
      required: false
      description: Sectors the organization operates in
    - name: domain_ids
      type: array[string]
      required: false
      description: Domains of focus
    - name: member_count
      type: integer
      required: false
      description: Number of members or employees
    - name: budget_range
      type: enum
      required: false
      description: Annual budget range
      enum_values:
        - under_100k
        - 100k_500k
        - 500k_1m
        - 1m_10m
        - over_10m
    - name: website
      type: string
      required: false
      description: Official website URL
    - name: contact_email
      type: string
      required: false
      description: Primary contact email
    - name: actor_ids
      type: array[string]
      required: false
      description: Key actors associated with organization
    - name: initiative_ids
      type: array[string]
      required: false
      description: Initiatives led by organization
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
  - field: name
    rule: max_length
    value: 200
    message: Name must not exceed 200 characters
  - field: contact_email
    rule: format
    value: email
    message: Must be a valid email address
  - field: website
    rule: format
    value: url
    message: Must be a valid URL
relationships:
  - entity: actor
    type: employs
    description: Organization employs actors
  - entity: initiative
    type: leads
    description: Organization leads initiatives
  - entity: project
    type: implements
    description: Organization implements projects
  - entity: location
    type: headquartered_in
    description: Organization is headquartered in location
  - entity: sector
    type: operates_in
    description: Organization operates in sectors
  - entity: domain
    type: focuses_on
    description: Organization focuses on domains
