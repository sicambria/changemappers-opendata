id: actor
name: Actor
description: A person, group, or entity that initiates, participates in, or influences change processes within the ChangeMappers ecosystem.
category: agent
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the actor
    - name: name
      type: string
      required: true
      description: Display name of the actor
    - name: type
      type: enum
      required: true
      description: Classification of the actor type
      enum_values:
        - person
        - group
        - organization
        - community
        - network
    - name: description
      type: string
      required: false
      description: Detailed description of the actor
    - name: aliases
      type: array[string]
      required: false
      description: Alternative names or identifiers
    - name: contact_info
      type: object
      required: false
      description: Contact details for the actor
    - name: location_id
      type: string
      required: false
      description: Reference to primary location
    - name: sector_ids
      type: array[string]
      required: false
      description: Sectors the actor operates in
    - name: skill_ids
      type: array[string]
      required: false
      description: Skills associated with this actor
    - name: created_at
      type: datetime
      required: true
      description: When the actor record was created
    - name: updated_at
      type: datetime
      required: true
      description: When the actor record was last updated
    - name: source
      type: string
      required: false
      description: Source of the actor information
    - name: external_urls
      type: array[string]
      required: false
      description: External references and profiles
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
  - field: name
    rule: max_length
    value: 200
    message: Name must not exceed 200 characters
  - field: description
    rule: max_length
    value: 5000
    message: Description must not exceed 5000 characters
relationships:
  - entity: organization
    type: belongs_to
    description: Actor may belong to an organization
  - entity: initiative
    type: participates_in
    description: Actor participates in initiatives
  - entity: project
    type: leads
    description: Actor may lead projects
  - entity: skill
    type: has
    description: Actor possesses skills
  - entity: location
    type: located_in
    description: Actor is located in a place
  - entity: sector
    type: operates_in
    description: Actor operates in sectors
