id: dataset
name: Dataset
description: A collection of structured data related to change initiatives, actors, outcomes, or other entities.
category: information
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the dataset
    - name: name
      type: string
      required: true
      description: Name of the dataset
    - name: description
      type: string
      required: true
      description: Description of the dataset contents
    - name: type
      type: enum
      required: true
      description: Classification of the dataset
      enum_values:
        - operational
        - research
        - monitoring
        - evaluation
        - geographic
        - historical
        - reference
    - name: format
      type: enum
      required: false
      description: Data format
      enum_values:
        - csv
        - json
        - geojson
        - yaml
        - xml
        - database
    - name: schema_url
      type: string
      required: false
      description: URL to dataset schema documentation
    - name: owner_id
      type: string
      required: false
      description: Actor or organization that owns the dataset
    - name: access_level
      type: enum
      required: true
      description: Access level
      enum_values:
        - public
        - restricted
        - private
    - name: license
      type: string
      required: false
      description: Data license
    - name: temporal_coverage
      type: string
      required: false
      description: Time period covered
    - name: geographic_coverage
      type: array[string]
      required: false
      description: Geographic areas covered
    - name: entity_types
      type: array[string]
      required: false
      description: Entity types included in dataset
    - name: record_count
      type: integer
      required: false
      description: Number of records
    - name: update_frequency
      type: enum
      required: false
      description: How often updated
      enum_values:
        - realtime
        - daily
        - weekly
        - monthly
        - quarterly
        - annually
        - static
    - name: quality_notes
      type: string
      required: false
      description: Notes on data quality
    - name: domain_ids
      type: array[string]
      required: false
      description: Domains covered
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
relationships:
  - entity: actor
    type: owned_by
    description: Dataset is owned by actors
  - entity: organization
    type: managed_by
    description: Dataset is managed by organizations
  - entity: domain
    type: covers
    description: Dataset covers domains
  - entity: location
    type: covers
    description: Dataset covers locations
  - entity: indicator
    type: provides
    description: Dataset provides indicator data
examples:
