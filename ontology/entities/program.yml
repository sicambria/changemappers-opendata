id: program
name: Program
description: An educational or training program that builds capacity, transfers knowledge, or develops skills for change work.
category: activity
version: 1.0.0
schema:
  fields:
    - name: id
      type: string
      required: true
      description: Unique identifier for the program
    - name: name
      type: string
      required: true
      description: Name of the program
    - name: description
      type: string
      required: true
      description: Description of the program
    - name: type
      type: enum
      required: true
      description: Classification of the program
      enum_values:
        - training
        - fellowship
        - apprenticeship
        - certification
        - workshop_series
        - mentorship
        - educational
    - name: organization_id
      type: string
      required: false
      description: Organization offering the program
    - name: skill_ids
      type: array[string]
      required: false
      description: Skills taught in the program
    - name: domain_ids
      type: array[string]
      required: false
      description: Domains covered
    - name: duration
      type: string
      required: false
      description: Duration of the program
    - name: format
      type: enum
      required: false
      description: Delivery format
      enum_values:
        - in_person
        - online
        - hybrid
        - self_paced
    - name: cost
      type: enum
      required: false
      description: Cost structure
      enum_values:
        - free
        - sliding_scale
        - fixed_fee
        - stipend
    - name: cohort_based
      type: boolean
      required: false
      description: Whether program has cohorts
    - name: location_ids
      type: array[string]
      required: false
      description: Program locations
    - name: prerequisite_skills
      type: array[string]
      required: false
      description: Required prerequisite skills
    - name: target_audience
      type: string
      required: false
      description: Target audience for the program
    - name: outcomes
      type: array[string]
      required: false
      description: Expected outcomes
    - name: alumni_network
      type: boolean
      required: false
      description: Whether program has alumni network
    - name: created_at
      type: datetime
      required: true
      description: Record creation timestamp
    - name: updated_at
      type: datetime
      required: true
      description: Last update timestamp
    - name: source
      type: string
      required: false
      description: Data source
validation_rules:
  - field: name
    rule: min_length
    value: 2
    message: Name must be at least 2 characters
  - field: description
    rule: min_length
    value: 20
    message: Description must be at least 20 characters
relationships:
  - entity: organization
    type: offered_by
    description: Program is offered by organization
  - entity: skill
    type: teaches
    description: Program teaches skills
  - entity: actor
    type: attended_by
    description: Program is attended by actors
  - entity: domain
    type: covers
    description: Program covers domains
  - entity: location
    type: located_in
    description: Program is located in locations
examples:
  - id: prog_001
