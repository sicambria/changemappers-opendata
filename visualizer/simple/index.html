<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changemappers Simple Graph Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
        }
        #dropzone {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            transition: background 0.3s;
        }
        #dropzone.dragover {
            background: linear-gradient(135deg, #1f3a5f 0%, #1a4d5f 100%);
        }
        #dropzone.hidden { display: none; }
        .drop-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.6;
        }
        .drop-text {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .drop-hint {
            font-size: 14px;
            color: #888;
        }
        #app {
            display: none;
            height: 100vh;
        }
        #app.visible { display: flex; }
        #sidebar {
            width: 280px;
            background: rgba(20, 20, 40, 0.95);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        #sidebar h2 {
            color: #4fc3f7;
            font-size: 18px;
            margin-bottom: 15px;
        }
        #graph-container {
            flex: 1;
            position: relative;
            background: #0f0f1a;
        }
        #graph {
            width: 100%;
            height: 100%;
        }
        .node-label {
            font-size: 10px;
            fill: #ccc;
            pointer-events: none;
        }
        .controls-section {
            margin-bottom: 20px;
        }
        .controls-section label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        .controls-section input[type="range"] {
            width: 100%;
        }
        .legend {
            margin-top: 20px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-size: 12px;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 10px;
        }
        #tooltip {
            position: absolute;
            background: rgba(20, 30, 50, 0.95);
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            pointer-events: none;
            display: none;
            max-width: 280px;
            z-index: 1000;
        }
        #tooltip h4 {
            color: #4fc3f7;
            margin-bottom: 6px;
            font-size: 14px;
        }
        #tooltip p {
            color: #bbb;
            font-size: 12px;
            margin: 3px 0;
        }
        #stats {
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
        .btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: linear-gradient(135deg, #4fc3f7, #2196f3);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div id="dropzone">
        <div class="drop-icon">&#128194;</div>
        <div class="drop-text">Drop JSON Graph File Here</div>
        <div class="drop-hint">or click to select a file</div>
        <input type="file" id="fileInput" accept=".json" style="display: none;">
    </div>
    
    <div id="app">
        <div id="sidebar">
            <h2>Simple Visualizer</h2>
            
            <div class="controls-section">
                <label>Link Distance</label>
                <input type="range" id="linkDistance" min="10" max="200" value="50">
            </div>
            
            <div class="controls-section">
                <label>Charge Strength</label>
                <input type="range" id="chargeStrength" min="-500" max="-50" value="-200">
            </div>
            
            <div class="controls-section">
                <label>Node Size</label>
                <input type="range" id="nodeSize" min="3" max="20" value="8">
            </div>
            
            <div class="legend" id="legend"></div>
            
            <div id="stats">
                <div>Nodes: <span id="nodeCount">0</span></div>
                <div>Edges: <span id="edgeCount">0</span></div>
            </div>
            
            <button class="btn" onclick="loadSampleData()">Load Sample Data</button>
            <button class="btn" style="background: linear-gradient(135deg, #66bb6a, #43a047);" onclick="resetZoom()">Reset View</button>
        </div>
        
        <div id="graph-container">
            <svg id="graph"></svg>
            <div id="tooltip"></div>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        const NODE_COLORS = {
            actors: '#4fc3f7',
            organizations: '#66bb6a',
            initiatives: '#ffa726',
            projects: '#ab47bc',
            events: '#ef5350',
            locations: '#26c6da',
            practices: '#ffee58',
            methodologies: '#ec407a',
            frameworks: '#5c6bc0',
            programs: '#8d6e63',
            traditions: '#78909c',
            tools: '#ff7043',
            skills: '#26a69a',
            stories: '#d4e157',
            patterns: '#7e57c2',
            causes: '#ffca28',
            metrics: '#8d6e63',
            indicators: '#4db6ac',
            impacts: '#ff8a65',
            outcomes: '#9575cd',
            default: '#9e9e9e'
        };

        let simulation, svg, g, link, node, label;
        let width, height;
        let graphData = { nodes: [], links: [] };

        function init() {
            const container = document.getElementById('graph-container');
            width = container.clientWidth;
            height = container.clientHeight;

            svg = d3.select('#graph')
                .attr('width', width)
                .attr('height', height);

            svg.append('defs').append('marker')
                .attr('id', 'arrowhead')
                .attr('viewBox', '-0 -5 10 10')
                .attr('refX', 20)
                .attr('refY', 0)
                .attr('orient', 'auto')
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .append('path')
                .attr('d', 'M 0,-5 L 10,0 L 0,5')
                .attr('fill', '#555');

            g = svg.append('g');

            link = g.append('g').attr('class', 'links').selectAll('line');
            node = g.append('g').attr('class', 'nodes').selectAll('circle');
            label = g.append('g').attr('class', 'labels').selectAll('text');

            const zoom = d3.zoom()
                .scaleExtent([0.1, 10])
                .on('zoom', (event) => g.attr('transform', event.transform));

            svg.call(zoom);

            setupDropZone();
            setupControls();
        }

        function setupDropZone() {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('fileInput');

            dropzone.addEventListener('click', () => fileInput.click());
            
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            });
            
            dropzone.addEventListener('dragleave', () => {
                dropzone.classList.remove('dragover');
            });
            
            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) loadFile(file);
            });
            
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) loadFile(file);
            });
        }

        function setupControls() {
            document.getElementById('linkDistance').addEventListener('input', updateSimulation);
            document.getElementById('chargeStrength').addEventListener('input', updateSimulation);
            document.getElementById('nodeSize').addEventListener('input', updateNodeSize);
        }

        function loadFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    showApp();
                    buildGraph(data);
                } catch (err) {
                    alert('Error parsing JSON: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function showApp() {
            document.getElementById('dropzone').classList.add('hidden');
            document.getElementById('app').classList.add('visible');
        }

        function buildGraph(data) {
            const nodes = (data.nodes || []).map(n => ({
                id: n.id,
                type: n.type || 'unknown',
                name: n.properties?.name || n.id,
                properties: n.properties || {}
            }));

            const links = (data.edges || data.links || []).map(e => ({
                source: e.source,
                target: e.target,
                type: e.type || 'related'
            }));

            graphData = { nodes, links };

            const typeCounts = {};
            nodes.forEach(n => {
                typeCounts[n.type] = (typeCounts[n.type] || 0) + 1;
            });

            updateLegend(typeCounts);
            updateStats(nodes.length, links.length);
            renderGraph();
        }

        function renderGraph() {
            simulation = d3.forceSimulation(graphData.nodes)
                .force('link', d3.forceLink(graphData.links).id(d => d.id).distance(50))
                .force('charge', d3.forceManyBody().strength(-200))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(15));

            link = link.data(graphData.links).enter().append('line')
                .attr('stroke', '#333')
                .attr('stroke-opacity', 0.4)
                .attr('stroke-width', 1);

            node = node.data(graphData.nodes).enter().append('circle')
                .attr('r', 8)
                .attr('fill', d => NODE_COLORS[d.type] || NODE_COLORS.default)
                .attr('stroke', '#fff')
                .attr('stroke-width', 1)
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended))
                .on('mouseover', showTooltip)
                .on('mouseout', hideTooltip);

            label = label.data(graphData.nodes).enter().append('text')
                .attr('class', 'node-label')
                .attr('dx', 12)
                .attr('dy', 4)
                .text(d => d.name.length > 15 ? d.name.substring(0, 15) + '...' : d.name);

            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                node
                    .attr('cx', d => d.x)
                    .attr('cy', d => d.y);

                label
                    .attr('x', d => d.x)
                    .attr('y', d => d.y);
            });
        }

        function updateSimulation() {
            if (!simulation) return;
            
            const linkDist = +document.getElementById('linkDistance').value;
            const chargeStr = +document.getElementById('chargeStrength').value;

            simulation
                .force('link').distance(linkDist)
                .force('charge').strength(chargeStr);

            simulation.alpha(0.5).restart();
        }

        function updateNodeSize() {
            const size = +document.getElementById('nodeSize').value;
            node.attr('r', size);
        }

        function updateLegend(typeCounts) {
            const legend = document.getElementById('legend');
            legend.innerHTML = '<h3 style="color: #4fc3f7; font-size: 14px; margin-bottom: 10px;">Node Types</h3>';
            
            Object.entries(typeCounts).sort((a, b) => b[1] - a[1]).forEach(([type, count]) => {
                const color = NODE_COLORS[type] || NODE_COLORS.default;
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${color}"></div>
                    <span>${type} (${count})</span>
                `;
                legend.appendChild(item);
            });
        }

        function updateStats(nodeCount, edgeCount) {
            document.getElementById('nodeCount').textContent = nodeCount;
            document.getElementById('edgeCount').textContent = edgeCount;
        }

        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = `
                <h4>${d.name}</h4>
                <p><strong>Type:</strong> ${d.type}</p>
                ${Object.entries(d.properties).slice(0, 5).map(([k, v]) => 
                    `<p><strong>${k}:</strong> ${typeof v === 'object' ? JSON.stringify(v) : v}</p>`
                ).join('')}
            `;
            tooltip.style.display = 'block';
            tooltip.style.left = (event.pageX + 15) + 'px';
            tooltip.style.top = (event.pageY + 15) + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').style.display = 'none';
        }

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        function resetZoom() {
            svg.transition().duration(500).call(
                d3.zoom().transform,
                d3.zoomIdentity.translate(0, 0).scale(1)
            );
        }

        function loadSampleData() {
            showApp();
            
            const types = Object.keys(NODE_COLORS).filter(t => t !== 'default');
            const nodes = [];
            const links = [];
            
            for (let i = 0; i < 100; i++) {
                nodes.push({
                    id: `node_${i}`,
                    type: types[Math.floor(Math.random() * types.length)],
                    properties: { name: `Node ${i}` }
                });
                
                if (i > 0 && Math.random() > 0.3) {
                    const target = Math.floor(Math.random() * i);
                    links.push({
                        source: `node_${i}`,
                        target: `node_${target}`,
                        type: 'related'
                    });
                }
            }
            
            buildGraph({ nodes, edges: links });
        }

        init();
    </script>
</body>
</html>
