<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changemappers Advanced Graph Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
        }
        #canvas { display: block; }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 25, 0.9);
            padding: 20px;
            border-radius: 12px;
            color: #e0e0e0;
            max-width: 300px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #controls h1 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #4fc3f7;
        }
        #controls label {
            display: block;
            margin: 10px 0 5px;
            font-size: 12px;
            color: #aaa;
        }
        #controls input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        #controls input[type="file"] {
            display: none;
        }
        .upload-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(135deg, #4fc3f7, #2196f3);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
            transition: transform 0.2s;
        }
        .upload-btn:hover { transform: scale(1.02); }
        #stats {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 15, 25, 0.9);
            padding: 15px 20px;
            border-radius: 8px;
            color: #888;
            font-size: 12px;
        }
        #legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 15, 25, 0.9);
            padding: 15px;
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 12px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        #legend h3 { margin-bottom: 10px; color: #4fc3f7; }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        #tooltip {
            position: absolute;
            display: none;
            background: rgba(20, 20, 35, 0.95);
            padding: 15px;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 13px;
            max-width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 1000;
        }
        #tooltip h4 { color: #4fc3f7; margin-bottom: 8px; }
        #tooltip p { margin: 4px 0; color: #bbb; }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4fc3f7;
            font-size: 24px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="controls">
        <h1>Advanced Graph Visualizer</h1>
        <p style="font-size: 12px; color: #888; margin-bottom: 15px;">
            WebGL visualization for 10,000+ nodes
        </p>
        
        <label>Force Strength: <span id="forceVal">0.5</span></label>
        <input type="range" id="forceStrength" min="0.1" max="2" step="0.1" value="0.5">
        
        <label>Link Distance: <span id="linkVal">30</span></label>
        <input type="range" id="linkDistance" min="10" max="100" step="5" value="30">
        
        <label>Node Size: <span id="sizeVal">1.0</span></label>
        <input type="range" id="nodeSize" min="0.5" max="3" step="0.1" value="1.0">
        
        <label>Repulsion: <span id="repVal">500</span></label>
        <input type="range" id="repulsion" min="100" max="2000" step="100" value="500">
        
        <input type="file" id="fileInput" accept=".json">
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
            Load JSON Graph
        </button>
        
        <button class="upload-btn" id="loadSample" style="background: linear-gradient(135deg, #66bb6a, #43a047);">
            Load Sample Data
        </button>
    </div>
    
    <div id="legend">
        <h3>Node Types</h3>
        <div id="legendItems"></div>
    </div>
    
    <div id="stats">
        <span id="nodeCount">0</span> nodes | 
        <span id="edgeCount">0</span> edges | 
        <span id="fps">0</span> FPS
    </div>
    
    <div id="tooltip"></div>
    <div id="loading" style="display: none;">Loading graph...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const NODE_COLORS = {
            actors: '#4fc3f7',
            organizations: '#66bb6a',
            initiatives: '#ffa726',
            projects: '#ab47bc',
            events: '#ef5350',
            locations: '#26c6da',
            practices: '#ffee58',
            methodologies: '#ec407a',
            frameworks: '#5c6bc0',
            programs: '#8d6e63',
            traditions: '#78909c',
            tools: '#ff7043',
            skills: '#26a69a',
            stories: '#d4e157',
            patterns: '#7e57c2',
            causes: '#ffca28',
            metrics: '#8d6e63',
            indicators: '#4db6ac',
            impacts: '#ff8a65',
            outcomes: '#9575cd',
            default: '#9e9e9e'
        };

        let scene, camera, renderer, graph, nodes = [], edges = [], octree;
        let forceStrength = 0.5, linkDistance = 30, nodeSizeScale = 1.0, repulsion = 500;
        let lastTime = performance.now(), frameCount = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
            camera.position.z = 500;
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            
            const directional = new THREE.DirectionalLight(0xffffff, 0.8);
            directional.position.set(1, 1, 1);
            scene.add(directional);
            
            setupControls();
            setupEventListeners();
            animate();
        }

        function setupControls() {
            let isDragging = false, prevMouse = { x: 0, y: 0 };
            let spherical = { theta: 0, phi: Math.PI / 2, radius: 500 };
            
            document.addEventListener('mousedown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
                isDragging = true;
                prevMouse = { x: e.clientX, y: e.clientY };
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - prevMouse.x;
                const dy = e.clientY - prevMouse.y;
                spherical.theta -= dx * 0.005;
                spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.005));
                updateCameraPosition();
                prevMouse = { x: e.clientX, y: e.clientY };
            });
            
            document.addEventListener('mouseup', () => isDragging = false);
            
            document.addEventListener('wheel', (e) => {
                spherical.radius = Math.max(50, Math.min(2000, spherical.radius + e.deltaY * 0.5));
                updateCameraPosition();
            });
            
            function updateCameraPosition() {
                camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
                camera.position.y = spherical.radius * Math.cos(spherical.phi);
                camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
                camera.lookAt(0, 0, 0);
            }
        }

        function setupEventListeners() {
            document.getElementById('forceStrength').addEventListener('input', (e) => {
                forceStrength = parseFloat(e.target.value);
                document.getElementById('forceVal').textContent = forceStrength.toFixed(1);
            });
            
            document.getElementById('linkDistance').addEventListener('input', (e) => {
                linkDistance = parseInt(e.target.value);
                document.getElementById('linkVal').textContent = linkDistance;
            });
            
            document.getElementById('nodeSize').addEventListener('input', (e) => {
                nodeSizeScale = parseFloat(e.target.value);
                document.getElementById('sizeVal').textContent = nodeSizeScale.toFixed(1);
                updateNodeSizes();
            });
            
            document.getElementById('repulsion').addEventListener('input', (e) => {
                repulsion = parseInt(e.target.value);
                document.getElementById('repVal').textContent = repulsion;
            });
            
            document.getElementById('fileInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) loadGraphFile(file);
            });
            
            document.getElementById('loadSample').addEventListener('click', loadSampleData);
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function loadGraphFile(file) {
            document.getElementById('loading').style.display = 'block';
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    buildGraph(data);
                } catch (err) {
                    alert('Error parsing JSON: ' + err.message);
                }
                document.getElementById('loading').style.display = 'none';
            };
            reader.readAsText(file);
        }

        function loadSampleData() {
            const sampleData = generateSampleGraph(1000);
            buildGraph(sampleData);
        }

        function generateSampleGraph(count) {
            const types = Object.keys(NODE_COLORS).filter(t => t !== 'default');
            const nodes = [];
            const edges = [];
            
            for (let i = 0; i < count; i++) {
                nodes.push({
                    id: `node_${i}`,
                    type: types[Math.floor(Math.random() * types.length)],
                    properties: { name: `Node ${i}` }
                });
                
                if (i > 0) {
                    const target = Math.floor(Math.random() * i);
                    edges.push({
                        source: `node_${i}`,
                        target: `node_${target}`,
                        type: 'related'
                    });
                }
            }
            
            return { nodes, edges };
        }

        function buildGraph(data) {
            clearScene();
            
            const nodeList = data.nodes || [];
            const edgeList = data.edges || data.links || [];
            
            const nodeMap = {};
            const typeCounts = {};
            
            nodeList.forEach((n, i) => {
                const color = NODE_COLORS[n.type] || NODE_COLORS.default;
                if (!typeCounts[n.type]) typeCounts[n.type] = 0;
                typeCounts[n.type]++;
                
                const geometry = new THREE.SphereGeometry(3 * nodeSizeScale, 16, 16);
                const material = new THREE.MeshPhongMaterial({ 
                    color: new THREE.Color(color),
                    emissive: new THREE.Color(color).multiplyScalar(0.3)
                });
                const mesh = new THREE.Mesh(geometry, material);
                
                const angle = Math.random() * Math.PI * 2;
                const radius = 100 + Math.random() * 200;
                const height = (Math.random() - 0.5) * 200;
                
                mesh.position.set(
                    Math.cos(angle) * radius,
                    height,
                    Math.sin(angle) * radius
                );
                
                mesh.userData = { 
                    id: n.id, 
                    type: n.type, 
                    properties: n.properties || {},
                    velocity: new THREE.Vector3(),
                    degree: 0
                };
                
                nodes.push(mesh);
                nodeMap[n.id] = mesh;
                scene.add(mesh);
            });
            
            edgeList.forEach(e => {
                const sourceNode = nodeMap[e.source];
                const targetNode = nodeMap[e.target];
                
                if (sourceNode && targetNode) {
                    sourceNode.userData.degree++;
                    targetNode.userData.degree++;
                    
                    const geometry = new THREE.BufferGeometry();
                    const positions = new Float32Array(6);
                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    
                    const material = new THREE.LineBasicMaterial({ 
                        color: 0x444444, 
                        transparent: true, 
                        opacity: 0.3 
                    });
                    
                    const line = new THREE.Line(geometry, material);
                    line.userData = { source: sourceNode, target: targetNode };
                    edges.push(line);
                    scene.add(line);
                }
            });
            
            updateLegend(typeCounts);
            updateStats(nodeList.length, edgeList.length);
            updateNodeSizes();
        }

        function updateNodeSizes() {
            nodes.forEach(node => {
                const degree = node.userData.degree || 1;
                const scale = Math.max(0.5, Math.min(3, 1 + degree * 0.1)) * nodeSizeScale;
                node.scale.setScalar(scale);
            });
        }

        function updateLegend(typeCounts) {
            const container = document.getElementById('legendItems');
            container.innerHTML = '';
            
            Object.entries(typeCounts).sort((a, b) => b[1] - a[1]).forEach(([type, count]) => {
                const color = NODE_COLORS[type] || NODE_COLORS.default;
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${color}"></div>
                    <span>${type} (${count})</span>
                `;
                container.appendChild(item);
            });
        }

        function updateStats(nodeCount, edgeCount) {
            document.getElementById('nodeCount').textContent = nodeCount;
            document.getElementById('edgeCount').textContent = edgeCount;
        }

        function clearScene() {
            nodes.forEach(n => scene.remove(n));
            edges.forEach(e => scene.remove(e));
            nodes = [];
            edges = [];
        }

        function simulateForces() {
            const positions = nodes.map(n => n.position);
            
            nodes.forEach((node, i) => {
                const vel = node.userData.velocity;
                vel.multiplyScalar(0.95);
                
                for (let j = i + 1; j < nodes.length; j++) {
                    const other = nodes[j];
                    const diff = new THREE.Vector3().subVectors(node.position, other.position);
                    const dist = Math.max(diff.length(), 1);
                    const force = repulsion / (dist * dist);
                    diff.normalize().multiplyScalar(force * 0.01);
                    vel.add(diff);
                    other.userData.velocity.sub(diff);
                }
                
                node.position.add(vel.clone().multiplyScalar(forceStrength));
            });
            
            edges.forEach(edge => {
                const source = edge.userData.source;
                const target = edge.userData.target;
                const diff = new THREE.Vector3().subVectors(target.position, source.position);
                const dist = diff.length();
                const force = (dist - linkDistance) * 0.01;
                diff.normalize().multiplyScalar(force);
                
                source.userData.velocity.add(diff.clone().multiplyScalar(0.5));
                target.userData.velocity.sub(diff.clone().multiplyScalar(0.5));
                
                const positions = edge.geometry.attributes.position.array;
                positions[0] = source.position.x;
                positions[1] = source.position.y;
                positions[2] = source.position.z;
                positions[3] = target.position.x;
                positions[4] = target.position.y;
                positions[5] = target.position.z;
                edge.geometry.attributes.position.needsUpdate = true;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (nodes.length > 0) {
                simulateForces();
            }
            
            renderer.render(scene, camera);
            
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = now;
            }
        }

        init();
    </script>
</body>
</html>
