# changemappers.org - Open Data Catalog
# Dataset Catalog Definition
# Version: 1.0.0
# Last Updated: 2026-04-08

# =============================================================================
# CATALOG STRUCTURE
# =============================================================================
# This catalog defines all datasets available in the changemappers open data
# ecosystem. Each dataset is versioned and includes comprehensive metadata
# for discovery, quality assessment, and integration.
#
# Dataset Sections:
#   - causes: Root cause analysis and driver datasets
#   - patterns: Change pattern libraries and templates
#   - stories: Narrative case studies and testimonials
#   - skills: Competency frameworks and skill taxonomies
#   - tools: Methodology and instrument catalogs
#   - traditions: Cultural and historical change contexts
#   - programs: Organized intervention datasets
#   - metamodels: Meta-level frameworks and schemas
# =============================================================================

catalog:
  id: changemappers-datasets
  name: ChangeMappers Open Data Catalog
  description: Comprehensive catalog of datasets for mapping, analyzing, and understanding systemic change processes
  version: "1.0.0"
  license: CC-BY-SA-4.0
  publisher: changemappers.org
  created: 2026-01-01
  modified: 2026-04-08

# =============================================================================
# CAUSES DATASETS
# =============================================================================
# Datasets containing root cause analysis, drivers of change, and causal
# relationship mappings for systemic transformation.
# =============================================================================

causes:
  - id: causes-drivers
    name: Change Drivers Dataset
    description: Primary drivers and forces that initiate and sustain systemic change processes
    version: "1.2.0"
    license: CC-BY-SA-4.0
    entity_types:
      - Cause
      - Actor
      - Domain
    relationship_types:
      - INITIATES
      - RELATES_TO
      - PRECEDES
    data_sources:
      - type: api
        url: https://api.changemappers.org/v1/causes/drivers
        format: json
      - type: export
        url: https://data.changemappers.org/exports/causes-drivers.csv
        format: csv
    update_frequency: monthly
    quality_metrics:
      completeness: 0.92
      accuracy: 0.89
      timeliness: 0.95
      consistency: 0.91
    validation_rules:
      - id must be unique
      - name is required
      - domain must reference valid domain entity

  - id: causes-root-analysis
    name: Root Cause Analysis Dataset
    description: Systematic analysis of root causes across different change domains and contexts
    version: "1.0.3"
    license: CC-BY-SA-4.0
    entity_types:
      - Cause
      - Pattern
      - Domain
    relationship_types:
      - DERIVES_FROM
      - RELATES_TO
      - PART_OF
    data_sources:
      - type: api
        url: https://api.changemappers.org/v1/causes/root-analysis
        format: json
    update_frequency: quarterly
    quality_metrics:
      completeness: 0.87
      accuracy: 0.85
      timeliness: 0.82
      consistency: 0.90

